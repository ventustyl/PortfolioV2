name: Portfolio production deployment

on:
  push:
    tags:
      - "prod-portfolio-*"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "PortfolioV2/PortfolioV2.csproj"
  SOLUTION_PATH: "PortfolioV2.slnx"
  PUBLISH_DIR: "publish"
  APP_PORT: "5000"
  RELEASE_ARCHIVE_NAME: "portfolio-release.tar.gz"

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      VPS_SERVICE_NAME: ${{ secrets.VPS_SERVICE_NAME }}

    steps:
      - name: Validate production tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^prod-portfolio-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag '${GITHUB_REF_NAME}'. Expected format: prod-portfolio-X.X.X"
            exit 1
          fi

          echo "Valid production tag: ${GITHUB_REF_NAME}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          dotnet restore "${SOLUTION_PATH}"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          dotnet build "${SOLUTION_PATH}" --configuration Release --no-restore

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${PUBLISH_DIR}"
          dotnet publish "${PROJECT_PATH}" \
            --configuration Release \
            --no-build \
            --output "${PUBLISH_DIR}"

      - name: Verify published output
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${PUBLISH_DIR}/PortfolioV2.dll" ]; then
            echo "::error::Missing ${PUBLISH_DIR}/PortfolioV2.dll after publish"
            echo "Published output content:"
            find "${PUBLISH_DIR}" -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "Published files:"
          find "${PUBLISH_DIR}" -maxdepth 3 -type f | sort

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail

          rm -f "${RELEASE_ARCHIVE_NAME}"
          tar -czf "${RELEASE_ARCHIVE_NAME}" -C "${PUBLISH_DIR}" .

          echo "Release archive created:"
          ls -lh "${RELEASE_ARCHIVE_NAME}"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          for variable_name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY VPS_DEPLOY_PATH VPS_SERVICE_NAME; do
            if [ -z "${!variable_name:-}" ]; then
              echo "::error::Missing required GitHub secret ${variable_name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          if [ "${VPS_SERVICE_NAME}" != "portfolio.service" ]; then
            echo "::error::VPS_SERVICE_NAME must be exactly portfolio.service"
            echo "::error::Current value is invalid."
            exit 1
          fi

          if [ "${VPS_DEPLOY_PATH}" != "/var/www/portfolio" ]; then
            echo "::error::VPS_DEPLOY_PATH must be exactly /var/www/portfolio"
            echo "::error::Current value is invalid."
            exit 1
          fi

          if ! [[ "${VPS_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::VPS_PORT must be a number"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/portfolio_deploy_key
          chmod 600 ~/.ssh/portfolio_deploy_key

          ssh-keyscan -p "${VPS_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload archive to VPS
        shell: bash
        run: |
          set -euo pipefail

          REMOTE_ARCHIVE="/tmp/portfolio-release-${GITHUB_REF_NAME}.tar.gz"

          scp -i ~/.ssh/portfolio_deploy_key \
            -P "${VPS_PORT}" \
            "${RELEASE_ARCHIVE_NAME}" \
            "${VPS_USER}@${VPS_HOST}:${REMOTE_ARCHIVE}"

      - name: Deploy on VPS
        shell: bash
        run: |
          set -euo pipefail

          REMOTE_ARCHIVE="/tmp/portfolio-release-${GITHUB_REF_NAME}.tar.gz"

          ssh -i ~/.ssh/portfolio_deploy_key \
            -p "${VPS_PORT}" \
            "${VPS_USER}@${VPS_HOST}" \
            "RELEASE_ARCHIVE='${REMOTE_ARCHIVE}' DEPLOY_PATH='${VPS_DEPLOY_PATH}' SERVICE_NAME='${VPS_SERVICE_NAME}' APP_PORT='${APP_PORT}' bash -s" <<'EOF'
          set -euo pipefail

          show_service_logs() {
            echo "===== portfolio.service logs ====="
            sudo journalctl -u portfolio.service -n 150 --no-pager || true
          }

          echo "===== Deployment variables ====="
          echo "RELEASE_ARCHIVE=${RELEASE_ARCHIVE}"
          echo "DEPLOY_PATH=${DEPLOY_PATH}"
          echo "SERVICE_NAME=${SERVICE_NAME}"
          echo "APP_PORT=${APP_PORT}"

          if [ "${SERVICE_NAME}" != "portfolio.service" ]; then
            echo "Invalid service name: ${SERVICE_NAME}"
            exit 1
          fi

          if [ "${DEPLOY_PATH}" != "/var/www/portfolio" ]; then
            echo "Invalid deploy path: ${DEPLOY_PATH}"
            exit 1
          fi

          if [ ! -f "${RELEASE_ARCHIVE}" ]; then
            echo "Missing release archive: ${RELEASE_ARCHIVE}"
            exit 1
          fi

          sudo mkdir -p "${DEPLOY_PATH}"

          echo "===== Stop service if active ====="
          sudo systemctl stop "${SERVICE_NAME}" || true

          echo "===== Clean deploy directory ====="
          sudo find "${DEPLOY_PATH}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +

          echo "===== Extract release archive ====="
          sudo tar -xzf "${RELEASE_ARCHIVE}" -C "${DEPLOY_PATH}"
          rm -f "${RELEASE_ARCHIVE}"

          echo "===== Deployed files ====="
          sudo find "${DEPLOY_PATH}" -maxdepth 3 -type f | sort

          if [ ! -f "${DEPLOY_PATH}/PortfolioV2.dll" ]; then
            echo "Missing ${DEPLOY_PATH}/PortfolioV2.dll after extraction"
            exit 1
          fi

          echo "===== Apply permissions ====="
          sudo chown -R ubuntu:ubuntu "${DEPLOY_PATH}"
          sudo chmod -R 755 "${DEPLOY_PATH}"

          echo "===== Restart service ====="
          sudo systemctl daemon-reload

          sudo systemctl restart "${SERVICE_NAME}" || {
            show_service_logs
            exit 1
          }

          sudo systemctl status "${SERVICE_NAME}" --no-pager || {
            show_service_logs
            exit 1
          }

          sudo systemctl is-active --quiet "${SERVICE_NAME}" || {
            show_service_logs
            exit 1
          }

          echo "===== Listening ports after restart ====="
          sudo ss -ltnp || true

          echo "===== Wait for Kestrel on port ${APP_PORT} ====="

          for attempt in {1..30}; do
            if curl -fsS -I "http://127.0.0.1:${APP_PORT}" >/tmp/kestrel-check.txt 2>/tmp/kestrel-error.txt; then
              echo "Kestrel is responding."
              cat /tmp/kestrel-check.txt
              break
            fi

            if ! sudo systemctl is-active --quiet "${SERVICE_NAME}"; then
              echo "Service stopped before Kestrel became available."
              show_service_logs
              exit 1
            fi

            echo "Waiting for Kestrel... attempt ${attempt}/30"
            sleep 2

            if [ "${attempt}" -eq 30 ]; then
              echo "Kestrel did not respond after 60 seconds."
              echo "Last curl error:"
              cat /tmp/kestrel-error.txt || true
              echo "Listening ports:"
              sudo ss -ltnp || true
              show_service_logs
              exit 1
            fi
          done

          echo "===== Test through Caddy Host header ====="

          for attempt in {1..15}; do
            if curl -fsS -I -H "Host: ericventurino.fr" "http://127.0.0.1" >/tmp/caddy-check.txt 2>/tmp/caddy-error.txt; then
              echo "Caddy reverse proxy is responding."
              cat /tmp/caddy-check.txt
              break
            fi

            echo "Waiting for Caddy reverse proxy... attempt ${attempt}/15"
            sleep 2

            if [ "${attempt}" -eq 15 ]; then
              echo "Caddy did not respond correctly after 30 seconds."
              echo "Last curl error:"
              cat /tmp/caddy-error.txt || true
              echo "Listening ports:"
              sudo ss -ltnp || true
              show_service_logs
              exit 1
            fi
          done

          echo "Deployment completed successfully."
          EOF
